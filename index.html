<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "TH Sarabun New", sans-serif;
}

body{
    background:linear-gradient(135deg,#dff6ff,#b8e8fc,#eaf9ff);
    background-size:400% 400%;
    animation:bgmove 10s ease infinite;
}

@keyframes bgmove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

header{
    background:rgba(255,255,255,0.7);
    backdrop-filter:blur(8px);
    padding:20px;
    text-align:center;
}

header h1{
    color:#0066cc;
    font-size:45px;
}

header p{
    color:#555;
    font-size:22px;
}

nav{
    display:flex;
    justify-content:center;
    gap:20px;
    padding:15px;
    background:#87CEFA;
}

nav a{
    text-decoration:none;
    color:white;
    font-size:22px;
    font-weight:bold;
    transition:.3s;
}

nav a:hover{
    color:yellow;
    transform:scale(1.1);
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:50px;
    margin-top:60px;
    flex-wrap:wrap;
}

.photo{
    width:260px;
    height:320px;
    border:5px dashed #5dade2;
    border-radius:20px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    color:gray;
    font-size:24px;
    overflow:hidden;
    animation:float 3s ease-in-out infinite;
}

.photo img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0);}
}

.text{
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.text h2{
    color:#0077cc;
    font-size:38px;
}

.text p{
    font-size:24px;
    margin-top:15px;
    line-height:1.6;
}

.button{
    display:inline-block;
    margin-top:25px;
    background:#4fc3f7;
    color:white;
    padding:12px 30px;
    border-radius:30px;
    text-decoration:none;
    font-size:22px;
    transition:.3s;
}

.button:hover{
    background:#039be5;
    transform:scale(1.05);
}

footer{
    margin-top:60px;
    text-align:center;
    padding:20px;
    background:#87CEFA;
    color:white;
    font-size:20px;
}

</style>

</head>

<body>

<header>

<h1>MY PORTFOLIO</h1>

<p>แฟ้มสะสมผลงานของฉัน</p>

</header>

<nav>

<a href="index.html">หน้าแรก</a>

<a href="profile.html">ประวัติส่วนตัว</a>

<a href="education.html">ประวัติการศึกษา</a>

<a href="award.html">กิจกรรม</a>

<a href="contact.html">ติดต่อ</a>

</nav>

<div class="container">

<div class="photo">

<!-- เปลี่ยน profile.jpg เป็นรูปของคุณ -->
<img src="profile.jpg" alt="รูปของฉัน">

</div>

<div class="text">

<h2>ยินดีต้อนรับ</h2>

<p>
สวัสดีค่ะ
ยินดีต้อนรับสู่เว็บไซต์ Portfolio
เว็บไซต์นี้รวบรวมข้อมูลส่วนตัว
ประวัติการศึกษา ผลงาน กิจกรรม
และช่องทางการติดต่อ
</p>

<a href="profile.html" class="button">
เริ่มต้นชม Portfolio
</a>

</div>

</div>

<footer>

จัดทำโดย :กรวรรณ ธนธรรมชัย

</footer>

</body>
</html>
